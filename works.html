<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集 - 作品</title>
    <style>
        /* 2K/4K 响应式断点 */
        @media (min-width: 2400px) {
            .works-title { font-size: 72px !important; }
            .works-desc { font-size: 22px !important; }
            .works-card-title { font-size: 24px !important; }
            .works-card-desc { font-size: 18px !important; }
        }
        @media (min-width: 3001px) {
            .works-title { font-size: 96px !important; }
            .works-desc { font-size: 28px !important; }
            .works-card-title { font-size: 32px !important; }
            .works-card-desc { font-size: 22px !important; }
        }
    </style>
</head>
<body class="bg-[var(--color-bg)] text-white min-h-screen flex flex-col">
    <!-- 导航栏 -->
    <div id="navbar"></div>

    <!-- 主内容 -->
    <main class="flex-1 pt-24 pb-16 px-6 md:px-12">
        <div class="max-w-7xl mx-auto">
            <!-- 页面标题 -->
            <div class="mb-12 animate-fade-in">
                <h1 class="works-title text-4xl md:text-5xl font-black mb-4">
                    我的<span class="text-[var(--color-primary)]">作品</span>
                </h1>
                <p class="works-desc text-[var(--color-text-dark)] text-base max-w-xl">
                    探索我的创意项目，包括交互设计、3D 可视化、Web 开发等多个领域。
                </p>
            </div>

            <!-- 分类筛选标签 -->
            <div class="flex flex-wrap gap-3 mb-10" id="filter-tags">
                <button class="filter-tag active" data-filter="all">全部</button>
                <button class="filter-tag" data-filter="web">网页设计</button>
                <button class="filter-tag" data-filter="3d">3D 可视化</button>
                <button class="filter-tag" data-filter="video">视频</button>
                <button class="filter-tag" data-filter="other">其他</button>
            </div>

            <!-- 作品网格 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="works-grid">
                <!-- 作品卡片由 JS 动态渲染 -->
            </div>

            <!-- 空状态提示 -->
            <div id="empty-state" class="hidden text-center py-20">
                <p class="text-[var(--color-text-dark)] text-lg">暂无该分类的作品</p>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <div id="footer"></div>

    <script type="module" src="/src/js/works.js"></script>
</body>
</html>
