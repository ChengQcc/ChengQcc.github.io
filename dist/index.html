<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particleify - Portfolio</title>
    <style>

            .hero-section {

                padding-top: 1rem !important;

            }
        }
    </style>
  <script type="module" crossorigin src="/assets/main-D5wcnw77.js"></script>

<body class="bg-[var(--color-bg)] text-white overflow-hidden select-none">

    <div id="app" class="flex flex-col h-screen w-screen" style="pointer-events: none;">
        <!-- WebGL 全屏底层 -->
        <section class="fixed top-0 left-0 w-screen h-screen z-0" style="pointer-events: auto;" id="webgl-container"></section>

        <!-- 导航栏 -->
        <div id="navbar" style="pointer-events: auto;" class="relative z-50"></div>

        <!-- 主内容区域 -->
        <main class="flex flex-1 relative z-10 pt-20">
            <section class="hero-section flex-[0_0_45%] px-[var(--layout-padding)] flex flex-col justify-center" style="pointer-events: auto;">
                <h1 class="hero-title text-[clamp(2.5rem,5vw,6rem)] leading-[1.05] font-black tracking-tight mb-8 uppercase">
                    <span class="text-white block">Turn Static</span>
                    <span class="text-[var(--color-text-muted)] block">Images Into</span>
                    <span class="text-[var(--color-primary)] block">3D Particles</span>
                </h1>
                <p class="hero-desc font-mono text-[var(--color-text-dark)] text-sm leading-relaxed max-w-[400px] mb-10">

                </p>
                <div class="flex flex-col">
                    <button class="btn-primary"><span>📥</span> EXPORT HTML</button>
                    <span class="font-mono text-[0.7rem] text-[var(--color-border)] mt-4">Click the gear icon to upload images and customize effects...</span>
                </div>
            </section>
