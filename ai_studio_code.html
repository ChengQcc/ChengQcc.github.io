<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particleify - Clean & Green</title>
    <style>
        /* ==========================================================================
           1. CSS 变量定义
           ========================================================================== */
        :root {
            --color-bg: #030305;
            --color-primary: #1ed760; /* 图片中的亮绿色 */
            --color-text-main: #ffffff;
            --color-text-muted: rgba(255, 255, 255, 0.4);
            --color-text-dark: #888899;
            --color-border: rgba(255, 255, 255, 0.15);
            
            --font-heading: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --font-body: monospace;
            --layout-padding: 3rem;
        }

        /* ==========================================================================
           2. 全局重置与基础样式
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--color-bg);
            color: var(--color-text-main);
            font-family: var(--font-heading);
            overflow: hidden; 
            user-select: none;
        }
        button { cursor: pointer; font-family: inherit; }
        a { color: inherit; text-decoration: none; }

        /* ==========================================================================
           3. 页面骨架布局
           ========================================================================== */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            pointer-events: none; /* 允许穿透 UI 点击底层的 3D 画布 */
        }

        /* WebGL 绝对全屏底层 */
        .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: auto; /* 接收拖拽事件 */
        }

        header {
            display: flex;
            justify-content: flex-start; /* 按钮移除后靠左对齐 */
            align-items: center;
            padding: 2rem var(--layout-padding);
            z-index: 10;
        }
        header > * { pointer-events: auto; }

        main {
            display: flex;
            flex: 1;
            position: relative;
            z-index: 10;
        }

        .ui-panel {
            flex: 0 0 45%;
            padding: 0 var(--layout-padding) var(--layout-padding) var(--layout-padding);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .ui-panel > * { pointer-events: auto; }

        /* ==========================================================================
           4. 组件细节样式
           ========================================================================== */
        .logo-wrap { display: flex; flex-direction: column; gap: 4px; }
        .logo-title { font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; gap: 8px;}
        .logo-icon { color: var(--color-primary); font-size: 1.2rem; }
        .logo-subtitle { font-size: 0.65rem; color: var(--color-text-dark); letter-spacing: 1px; text-transform: uppercase; }

        .hero-title {
            font-size: clamp(2.5rem, 5vw, 6rem); line-height: 1.05; font-weight: 900; letter-spacing: -1px; margin-bottom: 2rem; text-transform: uppercase;
        }
        .hero-title .line1 { color: var(--color-text-main); display: block; }
        .hero-title .line2 { color: var(--color-text-muted); display: block; }
        .hero-title .line3 { color: var(--color-primary); display: block; }

        .hero-desc {
            font-family: var(--font-body); color: var(--color-text-dark); font-size: 0.9rem; line-height: 1.6; max-width: 400px; margin-bottom: 2.5rem;
        }

        .btn-primary {
            background: var(--color-primary); color: #000; border: none; padding: 1rem 2rem; font-size: 0.9rem; font-weight: bold;
            display: inline-flex; align-items: center; gap: 10px; width: fit-content; transition: transform 0.2s ease, filter 0.2s ease;
        }
        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        .hint-text { font-family: var(--font-body); font-size: 0.7rem; color: var(--color-border); margin-top: 1rem; }

        .bottom-actions { margin-top: auto; display: flex; gap: 1rem; align-items: center; }
        .btn-social {
            background: transparent; border: 1px solid var(--color-border); color: var(--color-text-main);
            padding: 0.5rem 1rem; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; transition: all 0.2s;
        }
        .btn-social:hover { border-color: var(--color-text-main); }

        /* ==========================================================================
           5. 响应式布局 (适配手机与平板)
           ========================================================================== */
        @media (max-width: 768px) {
            :root { --layout-padding: 1.5rem; }
            header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            
            .ui-panel {
                flex: 1; width: 100%; padding: 1rem var(--layout-padding); justify-content: flex-start;
                background: linear-gradient(to bottom, rgba(3,3,5,0.8) 0%, transparent 100%);
            }
            .hero-title { margin-bottom: 1rem; }
            .hero-desc { margin-bottom: 1.5rem; }
            .bottom-actions { margin-top: 1.5rem; margin-bottom: 2rem;}
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
</head>
<body>

    <div id="app">
        <!-- 去掉了原先的 shape-indicator -->
        <section class="canvas-container" id="webgl-container"></section>

        <header>
            <div class="logo-wrap">
                <div class="logo-title"><span class="logo-icon">⚡</span> Particleify</div>
                <div class="logo-subtitle">From image to 3D particles</div>
            </div>
            <!-- 去掉了 Join Waitlist 按钮 -->
        </header>

        <main>
            <section class="ui-panel">
                <h1 class="hero-title">
                    <span class="line1">Turn Static</span>
                    <span class="line2">Images Into</span>
                    <span class="line3">3D Particles</span>
                </h1>
                <p class="hero-desc">
                    Turn static images into interactive 3D particle visuals. Create, customize, and export ready-to-use HTML in minutes.
                </p>
                <div style="display: flex; flex-direction: column;">
                    <button class="btn-primary"><span>📥</span> EXPORT HTML</button>
                    <span class="hint-text">Click the gear icon to upload images and customize effects...</span>
                </div>
                <div class="bottom-actions">
                    <button class="btn-social"><span>📖</span> 小红书</button>
                    <button class="btn-social"><span>𝕏</span> TWITTER</button>
                </div>
            </section>
        </main>
        <!-- 去掉了悬浮齿轮图标 -->
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        class ParticleEngine {
            constructor(containerId) {
                this.container = document.getElementById(containerId);
                
                this.PARTICLE_COUNT = 40000;
                this.INTERVAL_MS = 8000; 
                this.LERP_FACTOR = 0.025;
                
                this.shapesConfig =[
                    { id: 'InorganicFlower' },
                    { id: 'FluidKnot' },
                    { id: 'SpinningTop' },
                    { id: 'CrystalBurst' }
                ];
                this.shapesData =[];
                this.currentShapeIndex = -1;

                this.initScene();
                this.precalculateShapes();
                this.initParticles();
                
                this.updateResponsiveState(); 
                this.bindEvents();
                
                this.nextShape();
                this.timer = setInterval(() => this.nextShape(), this.INTERVAL_MS);
                this.animate();
            }

            initScene() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x030305, 0.002);

                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
                
                this.renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: "high-performance" });
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.container.appendChild(this.renderer.domElement);

                const renderScene = new RenderPass(this.scene, this.camera);
                const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.4, 0.5, 0.15);
                this.composer = new EffectComposer(this.renderer);
                this.composer.addPass(renderScene);
                this.composer.addPass(bloomPass);

                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.autoRotate = true;     
                this.controls.autoRotateSpeed = 1.0; 
                this.controls.maxDistance = 500;
            }

            updateResponsiveState() {
                const width = window.innerWidth;
                const height = window.innerHeight;
                const aspect = width / height;
                const isMobile = width <= 768;

                this.camera.aspect = aspect;
                
                let targetZ = 240; 
                if (aspect < 1.2) {
                    targetZ = 240 * (1.2 / aspect); 
                }
                this.camera.position.set(0, 0, targetZ);

                if (isMobile) {
                    this.camera.setViewOffset(width, height, 0, height * -0.15, width, height);
                } else {
                    this.camera.setViewOffset(width, height, width * -0.225, 0, width, height);
                }
                this.camera.updateProjectionMatrix();

                if (this.customMaterial) {
                    this.customMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
                }

                this.renderer.setSize(width, height);
                this.composer.setSize(width, height);
            }

            precalculateShapes() {
                const burstSpikes = Array.from({length: 40}, () => new THREE.Vector3(Math.random()-.5, Math.random()-.5, Math.random()-.5).normalize());
                const colorA = new THREE.Color();
                const colorB = new THREE.Color();

                this.shapesConfig.forEach(config => {
                    const pos = new Float32Array(this.PARTICLE_COUNT * 3);
                    const col = new Float32Array(this.PARTICLE_COUNT * 3);

                    for (let i = 0; i < this.PARTICLE_COUNT; i++) {
                        let i3 = i * 3;
                        let x = 0, y = 0, z = 0;
                        let c = new THREE.Color();

                        switch (config.id) {
                            case 'InorganicFlower':
                                let layer = Math.random(); let numP = 6; let pAngle = Math.PI * 2 / numP;
                                let phase = Math.floor(Math.random() * numP) * pAngle; let lt = (Math.random() - 0.5) * pAngle * 1.3;
                                let a = phase + lt; let dist, heightZ;
                                if (layer < 0.15) { dist = Math.random() * 20; heightZ = dist * 1.5; a = Math.random() * Math.PI * 2; c.setHex(0xaaaaaa).lerp(new THREE.Color(0x00ffff), Math.random()); }
                                else if (layer < 0.5) { dist = 25 * Math.cos(lt * 1.8) * Math.sqrt(Math.random()); heightZ = dist * dist * 0.04 + 3; a += pAngle / 2; c.setHex(0x00aaff).lerp(new THREE.Color(0xff00ff), dist/25); }
                                else { dist = 48 * Math.cos(lt * 1.5) * Math.sqrt(Math.random()); heightZ = dist * dist * 0.015 - 5; colorA.setHex(0xaaff00); colorB.setHex(0xff0055); c.copy(colorB).lerp(colorA, dist/48); }
                                x = dist * Math.cos(a); y = dist * Math.sin(a); z = heightZ; break;
                            case 'FluidKnot':
                                let tk = Math.random() * Math.PI * 2; let Rk = 28; let rk = 14;
                                let cx = (Rk + rk * Math.cos(5 * tk)) * Math.cos(2 * tk); let cy = (Rk + rk * Math.cos(5 * tk)) * Math.sin(2 * tk); let cz = rk * Math.sin(5 * tk);
                                let tubeA = Math.random() * Math.PI * 2; let tubeR = Math.random() * 6;
                                x = cx + tubeR * Math.cos(tubeA); y = cy + tubeR * Math.sin(tubeA); z = cz + tubeR * Math.cos(tubeA + tk);
                                let hl = Math.sin(5 * tk) * Math.cos(2 * tk); c.setHex(0x111122).lerp(new THREE.Color(0x99ccff), (hl + 1) / 2); break;
                            case 'SpinningTop':
                                let yT = (Math.random() * 65) - 25; let rT = 0;
                                if (yT > 5) { rT = 1.5 + 8 * Math.exp(-(yT - 5)/8); } else if (yT > -12) { rT = 34 * Math.cos((yT + 3.5) / 8.5 * (Math.PI / 2)) + 4; } else { rT = 38 * Math.cos((yT + 12) / 13 * (Math.PI / 2)); }
                                rT = Math.max(0.1, rT); let aT = Math.random() * Math.PI * 2;
                                x = rT * Math.cos(aT); z = rT * Math.sin(aT); y = yT;
                                let tilt = 0.35; let xx = x * Math.cos(tilt) - y * Math.sin(tilt); let yy = x * Math.sin(tilt) + y * Math.cos(tilt);
                                x = xx; y = yy;
                                let brush = Math.abs(Math.sin(aT * 2 + yT * 0.15)); 
                                // 【核心修改点】将发光色替换为了亮荧光绿：0x1ed760，并搭配极暗的绿色背景底色形成对比拉丝
                                c.setHex(0x051a05).lerp(new THREE.Color(0x1ed760), brush * brush); 
                                break;
                            case 'CrystalBurst':
                                colorA.setHex(0xccffff); colorB.setHex(0xffccff);
                                if (Math.random() < 0.15) {
                                    let p = new THREE.Vector3(Math.random()-.5, Math.random()-.5, Math.random()-.5).normalize().multiplyScalar(12 + Math.random()*2);
                                    x = p.x; y = p.y; z = p.z; c.copy(colorA).lerp(new THREE.Color(0x0055ff), Math.random());
                                } else {
                                    let spike = burstSpikes[Math.floor(Math.random() * burstSpikes.length)]; let d = 15 + Math.random() * 55;
                                    let up = Math.abs(spike.y) > 0.9 ? new THREE.Vector3(1,0,0) : new THREE.Vector3(0,1,0); let right = new THREE.Vector3().crossVectors(spike, up).normalize(); let fwd = new THREE.Vector3().crossVectors(right, spike).normalize();
                                    let w = (Math.random() - 0.5) * 6; let h = (Math.random() - 0.5) * 6;
                                    let p = spike.clone().multiplyScalar(d).add(right.multiplyScalar(w)).add(fwd.multiplyScalar(h));
                                    x = p.x; y = p.y; z = p.z; c.copy(colorA).lerp(colorB, d/70);
                                }
                                break;
                        }

                        x += (Math.random() - 0.5) * 1.5; y += (Math.random() - 0.5) * 1.5; z += (Math.random() - 0.5) * 1.5;
                        pos[i3] = x; pos[i3+1] = y; pos[i3+2] = z;
                        col[i3] = c.r; col[i3+1] = c.g; col[i3+2] = c.b;
                    }
                    this.shapesData.push({ positions: pos, colors: col });
                });
            }

            initParticles() {
                this.geometry = new THREE.BufferGeometry();
                const currentPositions = new Float32Array(this.PARTICLE_COUNT * 3);
                const currentColors = new Float32Array(this.PARTICLE_COUNT * 3);
                
                for(let i=0; i<this.PARTICLE_COUNT*3; i++) {
                    currentPositions[i] = (Math.random() - 0.5) * 400; currentColors[i] = 1.0;
                }

                this.geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
                this.geometry.setAttribute('color', new THREE.BufferAttribute(currentColors, 3));

                this.customMaterial = new THREE.ShaderMaterial({
                    uniforms: { 
                        uTime: { value: 0 },
                        uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } 
                    },
                    vertexShader: `
                        uniform float uTime; 
                        uniform float uPixelRatio;
                        varying vec3 vColor;
                        void main() {
                            vColor = color; vec3 pos = position;
                            pos.x += sin(uTime * 1.2 + pos.z * 0.05) * 0.4; pos.y += cos(uTime * 1.5 + pos.x * 0.05) * 0.4;
                            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                            gl_PointSize = (130.0 * uPixelRatio / -mvPosition.z) * (1.0 + sin(pos.x * 5.0)*0.2);
                            gl_Position = projectionMatrix * mvPosition;
                        }
                    `,
                    fragmentShader: `
                        varying vec3 vColor;
                        void main() {
                            vec2 xy = gl_PointCoord.xy - vec2(0.5); float ll = length(xy);
                            if(ll > 0.5) discard;
                            gl_FragColor = vec4(vColor, (0.5 - ll) * 1.8);
                        }
                    `,
                    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true
                });

                this.particles = new THREE.Points(this.geometry, this.customMaterial);
                this.scene.add(this.particles);

                const bgGeo = new THREE.BufferGeometry(); const bgPos = new Float32Array(2000 * 3);
                for(let i=0; i<6000; i++) bgPos[i] = (Math.random() - 0.5) * 1000;
                bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
                this.scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x555566, size: 1.0, transparent: true, opacity: 0.3 })));

                this.clock = new THREE.Clock();
            }

            nextShape() {
                this.currentShapeIndex = (this.currentShapeIndex + 1) % this.shapesConfig.length;
                this.targetPositions = this.shapesData[this.currentShapeIndex].positions;
                this.targetColors = this.shapesData[this.currentShapeIndex].colors;
            }

            bindEvents() {
                window.addEventListener('resize', () => {
                    this.updateResponsiveState();
                });
            }

            animate() {
                requestAnimationFrame(this.animate.bind(this));
                
                const elapsedTime = this.clock.getElapsedTime();
                const positions = this.geometry.attributes.position.array;
                const colors = this.geometry.attributes.color.array;

                for (let i = 0; i < this.PARTICLE_COUNT * 3; i++) {
                    positions[i] += (this.targetPositions[i] - positions[i]) * this.LERP_FACTOR;
                    colors[i] += (this.targetColors[i] - colors[i]) * this.LERP_FACTOR;
                }
                
                this.geometry.attributes.position.needsUpdate = true;
                this.geometry.attributes.color.needsUpdate = true;
                this.customMaterial.uniforms.uTime.value = elapsedTime;

                this.controls.update();
                this.composer.render();
            }
        }

        window.onload = () => {
            const app = new ParticleEngine('webgl-container');
        };

    </script>
</body>
</html>
